services:
  postgres:
    image: postgres:16-alpine
    container_name: ludocloud-postgres
    environment:
      POSTGRES_DB: ludocloud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ludocloud"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  ludocloud-backend:
    build:
      context: ../../
      dockerfile: infra/docker/backend.Dockerfile
    container_name: ludocloud-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ludocloud?schema=public
      JWT_ACCESS_SECRET: dev_access_secret_change_me
      JWT_REFRESH_SECRET: dev_refresh_secret_change_me
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN_DAYS: 7
      CORS_ORIGIN: http://localhost
      BOOKING_SLOT_MINUTES: 90
      BOOKING_OPEN_HOUR: 15
      BOOKING_CLOSE_HOUR: 23
      BOOKING_MAX_FUTURE_ACTIVE: 3
      BOOKING_CANCELLATION_HOURS: 2
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
    command:
      - sh
      - -c
      - until npm run prisma:migrate:deploy; do echo 'Database non pronto, ritento...'; sleep 2; done; npm run prisma:seed; exec node dist/src/main.js
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health/ready >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  ludocloud-frontend:
    build:
      context: ../../
      dockerfile: infra/docker/frontend.Dockerfile
    container_name: ludocloud-frontend
    depends_on:
      ludocloud-backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "80:80"

volumes:
  postgres_data:
